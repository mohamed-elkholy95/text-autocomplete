[mypy]
# Educational project with intentional duck-typing on the four-model
# contract (predict_next returns List[Tuple[str, float]] via Any). mypy
# catches real bugs — missing imports, undefined names — but we don't
# try to fully type the library.
python_version = 3.12
ignore_missing_imports = True
no_strict_optional = True
follow_imports = silent
warn_unused_ignores = False
disable_error_code = arg-type, return-value, attr-defined, dict-item, assignment, misc, var-annotated

[mypy-tests.*]
ignore_errors = True
