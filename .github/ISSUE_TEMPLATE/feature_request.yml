name: Feature request
description: Propose an enhancement.
labels: ["enhancement"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed design
      description: |
        Rough sketch of the change. If it touches an anchor in
        `docs/ARCHITECTURE.md §4` (e.g. "torch optional", "JSON
        persistence"), call that out explicitly.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
