name: Bug report
description: Something is broken or behaves unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report — please fill out the fields below so we can
        reproduce and fix the issue.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: "Short description of the bug"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Please include the exact commands or API calls.
      placeholder: |
        1. pip install -r requirements.txt
        2. uvicorn src.api.main:app --port 8010
        3. curl -X POST http://localhost:8010/... -d '{...}'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Include tracebacks, response bodies, log output if any.
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.12.3"
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API (FastAPI)
        - CLI
        - Frontend (React)
        - Models (ngram / markov / LSTM / Transformer)
        - Training scripts (bench_*)
        - Tests / CI
        - Docs
